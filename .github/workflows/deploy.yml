name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # -----------------------------
      # VALIDACIÓN (ANTES DEL DEPLOY)
      # -----------------------------
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run basic app test
        run: |
          pip install uvicorn
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/docs

      # -----------------------------
      # AWS AUTH
      # -----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # LOGIN A ECR
      # -----------------------------
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # -----------------------------
      # BUILD DOCKER IMAGE
      # -----------------------------
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

      # -----------------------------
      # TAG IMAGE
      # -----------------------------
      - name: Tag image
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
          618401929583.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # -----------------------------
      # PUSH A ECR
      # -----------------------------
      - name: Push image to ECR
        run: |
          docker push 618401929583.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # -----------------------------
      # REDEPLOY ECS
      # -----------------------------
      - name: Force new deployment in ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
